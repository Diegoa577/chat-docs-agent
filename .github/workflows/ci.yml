name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: cda_user
          POSTGRES_PASSWORD: cda_password
          POSTGRES_DB: cda_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -e ".[dev]"

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=cda_password psql -h localhost -U cda_user -d cda_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Create test database
        # DB-backed integration tests run against cda_test_db (see tests/conftest.py);
        # without it they would silently skip.
        run: |
          PGPASSWORD=cda_password psql -h localhost -U cda_user -d cda_db -c "CREATE DATABASE cda_test_db;"
          PGPASSWORD=cda_password psql -h localhost -U cda_user -d cda_test_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://cda_user:cda_password@localhost:5432/cda_db
          SYNC_DATABASE_URL: postgresql://cda_user:cda_password@localhost:5432/cda_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head

      - name: Run unit and integration tests (combined coverage)
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://cda_user:cda_password@localhost:5432/cda_db
          SYNC_DATABASE_URL: postgresql://cda_user:cda_password@localhost:5432/cda_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/unit tests/integration -v

      - name: Lint with ruff
        working-directory: ./backend
        run: |
          ruff check .

      - name: Type check with mypy
        working-directory: ./backend
        run: |
          mypy app

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: |
          npm run lint

      - name: Run frontend tests (with coverage)
        working-directory: ./frontend
        run: |
          npm run test:coverage

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm run build

  smoke:
    # Full-stack smoke test: build all images and check the backend health
    # endpoint. Runs on pull requests only to keep pushes fast (image builds
    # include the embedding model download and take several minutes).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Create env file from template
        run: cp .env.example .env

      - name: Build and start the stack
        run: docker compose up --build -d

      - name: Wait for backend health endpoint
        run: |
          for i in {1..36}; do
            if curl -sf http://localhost:8000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend
          exit 1

      - name: Tear down the stack
        if: always()
        run: docker compose down -v
