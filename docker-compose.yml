services:
  postgres:
    image: ankane/pgvector:latest
    container_name: cda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cda_user
      POSTGRES_PASSWORD: cda_password
      POSTGRES_DB: cda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cda_user -d cda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cda-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cda-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://cda_user:cda_password@postgres:5432/cda_db
      - SYNC_DATABASE_URL=postgresql://cda_user:cda_password@postgres:5432/cda_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-bge}
      - HF_HOME=/app/.cache/huggingface
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    command: ./scripts/entrypoint.sh

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cda-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://cda_user:cda_password@postgres:5432/cda_db
      - SYNC_DATABASE_URL=postgresql://cda_user:cda_password@postgres:5432/cda_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-bge}
      - HF_HOME=/app/.cache/huggingface
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.infrastructure.workers.celery_app worker --loglevel=info --concurrency=1 --pool=prefork

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Inlined into the Next.js bundle at build time (not a runtime env var).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: cda-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  postgres_data:
  uploaded_files:
  huggingface_cache:
